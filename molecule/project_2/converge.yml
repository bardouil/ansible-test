---
- name: Install Docker
  hosts: all
  become: true
  roles:
    - docker

- name: Deploy project_2
  hosts: all
  become: true
  vars:
    compose_project_name: project2
    compose_project_path: /opt/project2
    app_image: nginx:alpine
    app_port: 8082
    app_env: test
    db_host: localhost
    db_name: project2db
    db_user: project2user
    db_password: testpassword
    compose_template_src: "{{ molecule_scenario_directory }}/../../playbooks/project_2/templates/docker-compose.yml.j2"
    compose_extra_files:
      - src: "{{ molecule_scenario_directory }}/../../playbooks/project_2/templates/app.env.j2"
        dest: .env
        sensitive: true
    compose_start: false
  roles:
    - docker_compose
